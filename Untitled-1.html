<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#fff5f5;
}

.navbar{
background:#d60000;
height:75px;
display:flex;
align-items:center;
justify-content:space-between;

position:sticky;
top:0;
z-index:999;
}

.logo{
font-size:28px;
font-weight:700;
color:white;
}

.logout-btn{
background:white;
color:#d60000;
padding:10px 18px;

font-weight:600;
}

.container{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px 20px;
}

.card{
width:100%;
max-width:430px;
background:white;
padding:35px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.title{
text-align:center;
font-size:30px;
font-weight:700;
margin-bottom:20px;
color:#d60000;
}

input,
textarea,
select{
width:100%;
padding:15px;
margin-top:12px;
border:1px solid #ddd;
border-radius:12px;
font-size:15px;
}

button{
width:100%;
padding:15px;
margin-top:18px;
border:none;
border-radius:12px;

color:white;
font-size:16px;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:translateY(-3px);
background:#b80000;
}

.switch{

margin-top:18px;
}

.switch a{
color:#d60000;
text-decoration:none;
}

.error{
background:#ffdddd;
padding:12px;
border-radius:10px;
margin-bottom:15px;

}

.success{
background:#ddffdd;
padding:12px;

}

}

color:white;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

}

.product-card{

border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.12);
transition:0.3s;
}

.product-card:hover{
transform:translateY(-8px);
}

.product-card img{
width:100%;
height:220px;
object-fit:contain;
}

.product-card h2{
margin-top:15px;
color:#d60000;
}

.price{
font-size:22px;
font-weight:700;
margin-top:10px;
}

.buy-btn{
margin-top:15px;

background:#d60000;

text-align:center;

font-weight:700;
cursor:pointer;
}

#paymentSection{
margin-top:40px;
}

.payment-box{
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

</style>

</head>
<body>

<?php if(isset($_SESSION['user'])): ?>

<div class="navbar">

<div class="logo">
Jaybrand Delivery
</div>

<a href="?logout=true" class="logout-btn">
Logout
</a>

</div>

<?php endif; ?>

<?php if(!isset($_SESSION['user'])): ?>

<div class="container">

<div class="card">

<div class="title">
Jollibee Delivery
</div>

<?php if($error): ?>
<div class="error"><?php echo $error; ?></div>
<?php endif; ?>

<?php if($success): ?>
<div class="success"><?php echo $success; ?></div>
<?php endif; ?>

<div id="loginForm">

<form method="POST">

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit" name="login">
Login
</button>

</form>

<div class="switch">
No account?
<a href="#" onclick="showRegister()">Register</a>
</div>

</div>

<div id="registerForm" style="display:none;">

<form method="POST">

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit" name="register">
Create Account
</button>

</form>

<div class="switch">
Already have account?
<a href="#" onclick="showLogin()">Login</a>
</div>

</div>

</div>
</div>

<?php else: ?>

<div class="dashboard">

<div class="welcome">
<h1>Welcome, <?php echo $_SESSION['user']; ?> 🍔</h1>
<p>Order your favorite Jollibee meals online.</p>
</div>

<?php if($success): ?>
<div class="success"><?php echo $success; ?></div>
<?php endif; ?>

<div class="product-grid">

<?php foreach($products as $product): ?>

<div class="product-card">

<img src="<?php echo $product['image']; ?>">

<h2><?php echo $product['name']; ?></h2>

<div class="price">
₱<?php echo $product['price']; ?>
</div>

<div class="buy-btn"
onclick="showPayment(
'<?php echo $product['name']; ?>',
'<?php echo $product['price']; ?>'
)">
Order Now
</div>

</div>

<?php endforeach; ?>

</div>

<div id="paymentSection" style="display:none;">

<div class="payment-box">

<h2 style="color:#d60000;margin-bottom:20px;">
Payment & Delivery
</h2>

<form method="POST">

<input type="hidden" name="product_name" id="productInput">
<input type="hidden" name="total_price" id="priceInput">

<input type="number" name="quantity" placeholder="Quantity" required>

<input type="text" name="address" placeholder="Delivery Address" required>

<select name="payment_method" required>
<option value="">Select Payment Method</option>
<option>GCash</option>
<option>Maya</option>
<option>Cash on Delivery</option>
<option>BDO Online Banking</option>
</select>

<textarea placeholder="Additional Notes"></textarea>

<h3 id="selectedProduct" style="margin-top:20px;color:#d60000;"></h3>

<button type="submit" name="order">
Place Order
</button>

</form>

</div>
</div>

</div>

<?php endif; ?>

<script>

function showRegister(){

    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('registerForm').style.display = 'block';
}

function showLogin(){

    document.getElementById('registerForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
}

function showPayment(product, price){

    document.getElementById('paymentSection').style.display = 'block';

    document.getElementById('selectedProduct').innerHTML =
    "Product: " + product + "<br>Total Price: ₱" + price;

    document.getElementById('productInput').value = product;
    document.getElementById('priceInput').value = price;

    window.scrollTo({
        top: document.body.scrollHeight,
        behavior: 'smooth'
    });
}

</script>

</body>
</html>
